<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3DX Runtime Debug Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
    }
    h2 {
      margin-bottom: 10px;
    }
    #status {
      padding: 10px;
      border: 1px solid #bbb;
      background: #f7f7f7;
      font-weight: bold;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    #log {
      border: 1px solid #ddd;
      background: #fafafa;
      padding: 10px;
      min-height: 180px;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 12px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h2>3DX GitHub Pages Proof Test</h2>
  <div id="status">Starting script...</div>
  <div id="log"></div>

  <script>
    (function () {
      var statusEl = document.getElementById("status");
      var logEl = document.getElementById("log");

      function setStatus(msg) {
        statusEl.textContent = msg;
        console.log("[STATUS]", msg);
      }

      function log(msg) {
        logEl.textContent += msg + "\n";
        console.log("[LOG]", msg);
      }

      setStatus("Script started. Running diagnostics...");
      log("Page loaded at: " + new Date().toISOString());

      var count = 0;

      var timer = setInterval(function () {
        count++;

        log("Heartbeat #" + count);
        log("typeof window.widget = " + typeof window.widget);
        log("typeof window.require = " + typeof window.require);
        log("typeof window.requirejs = " + typeof window.requirejs);

        if (typeof window.widget !== "undefined" && window.widget) {
          clearInterval(timer);
          setStatus("Classic widget runtime detected.");

          if (typeof window.require === "function") {
            try {
              window.require(
                ["DS/WAFData/WAFData"],
                function (WAFData) {
                  log("WAFData loaded successfully.");
                  log("typeof WAFData = " + typeof WAFData);
                  setStatus("Classic widget runtime + WAFData available. Ready for 3DX API test.");
                },
                function (err) {
                  log("Require callback error: " + JSON.stringify(err));
                  setStatus("Widget runtime exists, but WAFData module failed to load.");
                }
              );
            } catch (e) {
              log("Exception during require/WAFData load: " + e.message);
              setStatus("Widget runtime exists, but require/WAFData threw an exception.");
            }
          } else {
            setStatus("Classic widget runtime detected, but require() is not available.");
          }

          return;
        }

        if (count >= 10) {
          clearInterval(timer);
          setStatus("No classic widget runtime detected after 10 seconds.");
          log("Conclusion: page is hosted correctly, but classic widget object is not being injected.");
          log("Likely causes: app registration type, cached page, or non-classic app container.");
        }
      }, 1000);
    })();
  </script>
</body>
</html>
