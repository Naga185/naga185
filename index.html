<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
    <title>Sample Widget Hello World</title>
    
    <widget:preferences>
        <widget:preference name="test_user" type="text" label="Test Username" defaultValue="Ganesh_Test_Admin"></widget:preference>
    </widget:preferences>

    <script type="text/javascript" src="https://uwa.3dexperience.3ds.com/resources/v1/ui/uwa/js/UWA_W3C.js"></script>
    <script type="text/javascript">
        // <![CDATA[
        /*global widget, require*/
        widget.addEvent('onLoad', function() {
            var baseUrl = widget.getUrl().substring(0, widget.getUrl().lastIndexOf('/') + 1);

            require.config({
                baseUrl: baseUrl
            });

            require(['scripts/Main'], function(Main) {
                Main.init();
            });
        });
        // ]]>
    </script>
</head>
<body>
    <div id="widget-content">Loading Widget Content...</div>
</body>
</html>
