<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
    <title>3DX GitHub Pages Proof Test</title>

    <meta name="author" content="Test Widget" />
    <meta name="description" content="Proof test for 3DX API access from GitHub Pages" />
    <meta name="apiVersion" content="1.0" />
    <meta name="debugMode" content="true" />
    <meta name="strictMode" content="false" />

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript">
    function show(msg) {
        var el = document.getElementById("status");
        if (el) el.textContent = msg;
        console.log(msg);
    }

    function widgetLoading(attempt) {
        attempt = attempt || 0;

        var info = [
            "window.widget=" + typeof window.widget,
            "window.require=" + typeof window.require,
            "window.requirejs=" + typeof window.requirejs
        ].join(" | ");

        if (typeof window.widget !== "undefined" && window.widget) {
            show("Classic widget runtime detected. " + info);
            executeInitWidget(window.widget);
            return;
        }

        if (attempt > 20) {
            show("No classic widget runtime detected. " + info);
            return;
        }

        setTimeout(function () {
            widgetLoading(attempt + 1);
        }, 300);
    }

    widgetLoading();
</script>
</html>
