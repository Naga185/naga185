<!DOCTYPE html>
<html xmlns:widget="http://www.netvibes.com/ns/">

<head>

    <title>Sample Widget Hello World</title>

    <widget:preferences>
        <widget:preference
            name="test_user"
            type="text"
            label="Test Username"
            defaultValue="Ganesh_Test_Admin">
        </widget:preference>
    </widget:preferences>

    <script type="text/javascript"
        src="https://uwa.3dexperience.3ds.com/resources/v1/ui/uwa/js/UWA_W3C.js">
    </script>

    <script type="text/javascript">

        widget.addEvent('onLoad', function () {

            var baseUrl =
                widget.getUrl().substring(
                    0,
                    widget.getUrl().lastIndexOf('/') + 1
                );

            require.config({
                baseUrl: baseUrl
            });

            require(['scripts/Main'], function (Main) {
                Main.init();
            });
        });

    </script>

</head>

<body>

    <div id="widget-content">
        Loading Widget Content...
    </div>

</body>
</html>
