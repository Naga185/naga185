<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">

<head>
    <title>PLM Coach Sample Widget Hello World</title>

    <meta name="author" content="CM9" />
    <meta name="description" content="CM9 Widget Hello World" />
    <meta name="apiVersion" content="1.3" />

    <widget:preferences>
        <widget:preference type="text" name="UserName" label="User Name" defaultValue="Toto"/>
    </widget:preferences>

    <link rel="stylesheet" type="text/css" href="styles/Main.css" />

    <script type="text/javascript">
        // <![CDATA[
        /*global widget, require*/
        
        widget.addEvent('onLoad', function() {
            // Get the base URL path where your widget file lives on GitHub Pages
            var baseUrl = widget.getUrl().substring(0, widget.getUrl().lastIndexOf('/') + 1);

            require.config({
                baseUrl: baseUrl
            });

            // CHANGE THIS: Look for 'Main' instead of 'scripts/Main'
            require(['Main'], function(Main) {
                Main.init();
            });
        });
        // ]]>
    </script>
</head>

<body>
    <div id="widget-content">Loading Widget Content...</div>
</body>

</html>
